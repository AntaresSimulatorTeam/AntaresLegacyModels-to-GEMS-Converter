# Configuration file to convert a complex modelling artefact in an Antares study into an Andromede model.

template:
  name: psp_closed_daily
  generator-version-compatibility: X.Y #TODO: find this information
  model: andromede-v1-models.psp_closed_daily
  # scenario-group: scenario_psp_closed #To do : the modeler-scenario
  template-parameters:
    - name: area
      description: "Area identifier for the component"
      exclude:
      - id: dekf
        object-properties:
          type: area
          area: dekf
      - id: dke
        object-properties:
          type: area
          area: dke
      - id: dkkf
        object-properties:
          type: area
          area: dkkf
      - id: dkw
        object-properties:
          type: area
          area: dkw
      - id: fr
        object-properties:
          type: area
          area: fr
      - id: itcn
        object-properties:
          type: area
          area: itcn
      - id: nl
        object-properties:
          type: area
          area: nl
      - id: nom
        object-properties:
          type: area
          area: nom
      - id: non
        object-properties:
          type: area
          area: non
      - id: nos
        object-properties:
          type: area
          area: nos
      - id: pt
        object-properties:
          type: area
          area: pt
      - id: se1
        object-properties:
          type: area
          area: se1
      - id: se2
        object-properties:
          type: area
          area: se2
      - id: se3
        object-properties:
          type: area
          area: se3
      - id: se4
        object-properties:
          type: area
          area: se4
      - id: ukni
        object-properties:
          type: area
          area: ukni
      - id: ve_eu
        object-properties:
          type: area
          area: ve_eu
      - id: ve_vhr_storage
        object-properties:
          type: area
          area: ve_vhr_storage
      - id: ve_fr_mobilite_lourde
        object-properties:
          type: area
          area: ve_fr_mobilite_lourde
      - id: ve_fr_load_total
        object-properties:
          type: area
          area: ve_fr_load_total          
      - id: ve_fr_load_journee
        object-properties:
          type: area
          area: ve_fr_load_journee      
      - id: w_hydro_open_at
        object-properties:
          type: area
          area: w_hydro_open_at
      - id: w_hydro_open_cz
        object-properties:
          type: area
          area: w_hydro_open_cz
      - id: w_hydro_open_de
        object-properties:
          type: area
          area: w_hydro_open_de
      - id: w_hydro_open_es
        object-properties:
          type: area
          area: w_hydro_open_es
      - id: w_hydro_open_itcs
        object-properties:
          type: area
          area: w_hydro_open_itcs
      - id: w_hydro_open_itn
        object-properties:
          type: area
          area: w_hydro_open_itn
      - id: w_hydro_open_itsic
        object-properties:
          type: area
          area: w_hydro_open_itsic
      - id: w_hydro_open_nom
        object-properties:
          type: area
          area: w_hydro_open_nom
      - id: w_hydro_open_non
        object-properties:
          type: area
          area: w_hydro_open_non
      - id: w_hydro_open_nos
        object-properties:
          type: area
          area: w_hydro_open_nos
      - id: w_hydro_open_pl
        object-properties:
          type: area
          area: w_hydro_open_pl
      - id: w_hydro_open_pt
        object-properties:
          type: area
          area: w_hydro_open_pt
      - id: x_closed_pump
        object-properties:
          type: area
          area: x_closed_pump
      - id: x_closed_turb
        object-properties:
          type: area
          area: x_closed_turb
      - id: x_open_pump
        object-properties:
          type: area
          area: x_open_pump
      - id: x_open_turb
        object-properties:
          type: area
          area: x_open_turb
      - id: y_nuc_modulation
        object-properties:
          type: area
          area: y_nuc_modulation
      - id: z_batteries
        object-properties:
          type: area
          area: z_batteries
      - id: z_batteries_pcomp
        object-properties:
          type: area
          area: z_batteries_pcomp
      - id: z_effacement
        object-properties:
          type: area
          area: z_effacement
      - id: z_p2g_asservi
        object-properties:
          type: area
          area: z_p2g_asservi
      - id: z_p2g_base
        object-properties:
          type: area
          area: z_p2g_base
      - id: z_report
        object-properties:
          type: area
          area: z_report
      - id: zz_flowbased
        object-properties:
          type: area
          area: zz_flowbased

  component:
    id: psp_closed_${area}
    parameters:
      - id: hurdle_cost
        scenario-dependent: false
        time-dependent: false
        value:
          constant: 0.01
      - id: efficiency_injection
        time-dependent: false
        scenario-dependent: false
        value:
          object-properties:
            type: binding_constraint
            binding-constraint-id: psp_closed_${area}
            field: ${area}%x_closed_pump
      - id: efficiency_withdrawal
        time-dependent: false
        scenario-dependent: false
        value:
          object-properties:
            type: binding_constraint
            binding-constraint-id: psp_closed_${area}
            field: ${area}%x_closed_turb
      - id: p_max_injection
        time-dependent: true
        scenario-dependent: false
        value:  
          object-properties:
            type: link
            link: ${area} / x_closed_pump
            field: capacity_direct
      - id: p_max_withdrawal
        time-dependent: true
        scenario-dependent: false
        value:  
          object-properties:
            type: link
            link: ${area} / x_closed_turb
            field: capacity_indirect

  # For full modeler mode
  connections:
    - component1: psp_closed_${area}
      port1: injection_port
      component2: ${area}
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: psp_closed_${area}
      port: balance_port
      area: ${area}

  legacy-objects-to-delete: #for each area not in the exclude list, delete the legacy objects
    - id: psp_closed_${area}
      object-properties:
        type: binding_constraint
        binding-constraint-id: psp_closed_${area}
    - id: x_closed_turb
      object-properties:
        type: link
        link: ${area} / x_closed_turb
    - id: x_closed_pump
      object-properties:
        type: link
        link: ${area} / x_closed_pump