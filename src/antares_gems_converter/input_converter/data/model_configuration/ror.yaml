# Configuration file to convert a complex modelling artefact in an Antares study into an Andromede model.

template:
  name: ror
  generator-version-compatibility: X.Y #TODO: find this information
  model: antares_legacy_models.renewable
  template-parameters:
    - name: area
      description: "Area identifier for the solar component"
      # exclude:

  components:
    - id: ${area}_run_of_river
      parameters:
        - id: nominal_capacity
          time-dependent: false
          scenario-dependent: false
          value:
            constant: 1
        - id: num_units
          time-dependent: false
          scenario-dependent: false
          value:
            constant: 1
        - id: available_power
          time-dependent: true
          scenario-dependent: true
          value:
            object-properties:
              type: hydro
              area: ${area}
              field: ror
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: run_of_river

  # For full modeler mode
  connections:
    - component1: ${area}_run_of_river
      port1: balance_port
      component2: ${area}_node
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: ${area}_run_of_river
      port: balance_port
      area: ${area}

  legacy-objects-to-delete:
    - id: legacy_ror
      object-properties:
        type: hydro
        area: ${area}
        field: ror