# Configuration file to convert a complex modelling artefact in an Antares study into an Andromede model.

template:
  name: st_storage
  generator-version-compatibility: X.Y #TODO: find this information
  model: antares_legacy_models.short_term_storage
  template-parameters:
    - name: area
      cluster-type: st_storage
      description: "Area identifier for the component"
      # exclude:

  components:
    - id: ${area}_${st_storage}
      parameters:
        - id: reservoir_capacity
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: reservoir_capacity
        - id: nominal_injection_capacity
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: injection_nominal_capacity
        - id: nominal_withdrawal_capacity
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: withdrawal_nominal_capacity
        - id: injection_efficiency
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: efficiency
        - id: withdrawal_efficiency
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: efficiency_withdrawal
        - id: lower_rule_curve
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: lower_rule_curve
        - id: upper_rule_curve
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: upper_rule_curve
        - id: max_injection_modulation
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: pmax_injection
        - id: max_withdrawal_modulation
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: pmax_withdrawal
        - id: inflows
          time-dependent: true
          scenario-dependent: true
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: storage_inflows
        - id: initial_level
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: initial_level
        - id: injection_cost
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: cost_injection
        - id: withdrawal_cost
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: cost_withdrawal
        - id: level_cost
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: cost_level
        - id: is_overflow_allowed
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: allow_overflow
        - id: is_injection_variation_penalized
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: penalize_variation_injection
        - id: is_withdrawal_variation_penalized
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: penalize_variation_withdrawal
        - id: injection_variation_penalty
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: cost_variation_injection
        - id: withdrawal_variation_penalty
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: cost_variation_withdrawal
        - id: overflow_cost
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: hydro
              area: ${area}
              field: overflow_spilled_cost_difference
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: group
          value:
            object-properties:
              type: st_storage
              area: ${area}
              cluster: ${st_storage}
              field: group

  # For full modeler mode
  connections:
    - component1: ${area}_${st_storage}
      port1: balance_port
      component2: ${area}
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: ${area}_${st_storage}
      port: balance_port
      area: ${area}

  legacy-objects-to-delete:
    - id: legacy_st_storages
      object-properties:
        type: st_storage
        area: ${area}
        cluster: ${st_storage}
