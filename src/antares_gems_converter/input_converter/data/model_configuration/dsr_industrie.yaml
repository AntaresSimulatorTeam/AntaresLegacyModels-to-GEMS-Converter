      #      type: binding_constraint
      #      binding-constraint-id: ${area}_dsr_industrie_stock_lt
      #      field: energy_max_daily_${area}_dsr_industrie
  
  # For full modeler mode
  connections:
    - component1: dsr_industrie_${area}
      port1: injection_port
      component2: ${area}
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: dsr_industrie_${area}
      port: balance_port
      area: ${area}

