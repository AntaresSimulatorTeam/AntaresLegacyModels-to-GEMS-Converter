  component:
    id: dsr_industrie_${area}
    parameters:
      - id: max_load
        scenario-dependent: true
        time-dependent: true
        value:
          object-properties:
            type: thermal
            area: ${area}
            cluster: ${area}_dsr_industrie
            field: thermal_series
      - id: curtailment_price
        scenario-dependent: false
        time-dependent: false
        value:
          object-properties:
            type: thermal
            area: ${area}
            cluster: ${area}_dsr_industrie
            field: marginal_cost
      # - id: energy_max_daily
      #   scenario-dependent: false
