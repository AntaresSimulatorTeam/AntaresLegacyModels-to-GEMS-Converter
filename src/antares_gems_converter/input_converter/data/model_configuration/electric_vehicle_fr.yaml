  component:
    id: electric_vehicle_fr
    parameters:
      - id: stock_energie_ve
        scenario-dependent: false
        time-dependent: true
        value:
          object-properties:
            type: thermal
            area: ve_vhr_storage
            cluster: ve_vhr_storage_ve_fr_1
            field: thermal_series
      # - id: stock_energie_ve_2
      #   scenario-dependent: false
      #   time-dependent: true
      #   value:
      #     object-properties:
      #       type: thermal
      #       area: ve_vhr_storage
      #       cluster: ve_vhr_storage_ve_fr_1
      #       field: thermal_series
      - id: hurdle_cost
        scenario-dependent: false
        time-dependent: false
        value:
          constant: 0.01
      - id: rendement_charge_ve
        time-dependent: false
        scenario-dependent: false
        value:
          object-properties:
            type: binding_constraint
            binding-constraint-id: ve_stock_fr
            field: fr%ve_fr_load_total
      - id: rendement_v2g
        time-dependent: false
        scenario-dependent: false
        value:
          object-properties:
            type: binding_constraint
            binding-constraint-id: ve_stock_fr
            field: fr.fr_ve_inj
      - id: ve_dispo_v2g
        scenario-dependent: false
        time-dependent: true
        value:
          object-properties:
            type: thermal
            area: fr
            cluster: fr_ve_inj
            field: thermal_series
      # - id: ve_dispo_charging
      #   scenario-dependent: false
      #   time-dependent: true
      #   value:
      #     object-properties:
      #       type: row_bal
      #       area: ve_fr_total_load
      - id: ve_dispo_mobilite_lourde #capacite lien VE_FR_mobilite_lourde
        time-dependent: true
        scenario-dependent: false
        value:  
          object-properties:
            type: link
            link: fr / ve_fr_mobilite_lourde
            field: capacity_direct

  # For full modeler mode
  connections:
    - component1: electric_vehicle_${area}
      port1: injection_port
      component2: ${area}
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: electric_vehicle_fr
      port: balance_port
      area: fr

  legacy-objects-to-delete: #for each area not in the exclude list, delete the legacy objects
    - id: ve_fr_load_min
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_fr_load_min
    - id: ve_fr_night_load_min
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_fr_night_load_min
    - id: ve_fr_mobilite_lourde
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_fr_mobilite_lourde
    - id: ve_level_fr
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_level_fr
    - id: ve_level_min_fr
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_level_min_fr
    - id: ve_stock_fr
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_stock_fr
    - id: ve_v2g_limit
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_v2g_limit
    - id: fr_ve_inj
      object-properties:
        type: thermal
        area: fr
        cluster: fr_ve_inj
    - id: ve_fr_load_total
      object-properties:
        type: area
        area: ve_fr_load_total
    - id: ve_fr_load_journee
      object-properties:
        type: area
