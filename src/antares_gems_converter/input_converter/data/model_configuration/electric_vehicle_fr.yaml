        link: fr / ve_fr_load_journee
    - id: ve_fr_mobilite_lourde
      object-properties:
        type: link
        link: fr / ve_fr_mobilite_lourde
    - id: ve_fr_load_journee_ve_fr_load_total
      object-properties:
        type: link
        link: ve_fr_load_journee / ve_fr_load_total
    - id: ve_vhr_storage_ve_fr_1
      object-properties:
        type: thermal
        area: ve_vhr_storage
        cluster: ve_vhr_storage_ve_fr_1
    - id: ve_vhr_storage_ve_fr_2
