# Configuration file to convert a complex modelling artefact in an Antares study into an Andromede model.

template:
  name: electric_vehicle_eu
  generator-version-compatibility: X.Y #TODO: find this information
  model: andromede-v1-models.electric_vehicle_eu
  scenario-group: scenario_electric_vehicle #To do : the modeler-scenario
  template-parameters:
    - name: area
      description: "Area identifier for the component"
      exclude:
      - id: fr
        object-properties:
          type: area
          area: fr
      - id: ch
        object-properties:
          type: area
          area: ch
      - id: dekf
        object-properties:
          type: area
          area: dekf
      - id: dkkf
        object-properties:
          type: area
          area: dkkf
      - id: itca
        object-properties:
          type: area
          area: itca
      - id: itsar
        object-properties:
          type: area
          area: itsar
      - id: its
        object-properties:
          type: area
          area: its
      - id: itsic
        object-properties:
          type: area
          area: itsic
      - id: lu
        object-properties:
          type: area
          area: lu
      - id: nom
        object-properties:
          type: area
          area: nom
      - id: non
        object-properties:
          type: area
          area: non
      - id: se1
        object-properties:
          type: area
          area: se1
      - id: se2
        object-properties:
          type: area
          area: se2
      - id: se4
        object-properties:
          type: area
          area: se4
      - id: ve_eu
        object-properties:
          type: area
          area: ve_eu
      - id: ve_fr_load_journee
        object-properties:
          type: area
          area: ve_fr_load_journee
      - id: ve_fr_load_total
        object-properties:
          type: area
          area: ve_fr_load_total
      - id: ve_fr_mobilite_lourde
        object-properties:
          type: area
          area: ve_fr_mobilite_lourde
      - id: ve_vhr_storage
        object-properties:
          type: area
          area: ve_vhr_storage
      - id: w_hydro_open_at
        object-properties:
          type: area
          area: w_hydro_open_at
      - id: w_hydro_open_cz
        object-properties:
          type: area
          area: w_hydro_open_cz
      - id: w_hydro_open_de
        object-properties:
          type: area
          area: w_hydro_open_de
      - id: w_hydro_open_es
        object-properties:
          type: area
          area: w_hydro_open_es
      - id: w_hydro_open_itcs
        object-properties:
          type: area
          area: w_hydro_open_itcs
      - id: w_hydro_open_itn
        object-properties:
          type: area
          area: w_hydro_open_itn
      - id: w_hydro_open_itsic
        object-properties:
          type: area
          area: w_hydro_open_itsic
      - id: w_hydro_open_nom
        object-properties:
          type: area
          area: w_hydro_open_nom
      - id: w_hydro_open_non
        object-properties:
          type: area
          area: w_hydro_open_non
      - id: w_hydro_open_nos
        object-properties:
          type: area
          area: w_hydro_open_nos
      - id: w_hydro_open_pl
        object-properties:
          type: area
          area: w_hydro_open_pl
      - id: w_hydro_open_pt
        object-properties:
          type: area
          area: w_hydro_open_pt
      - id: x_closed_pump
        object-properties:
          type: area
          area: x_closed_pump
      - id: x_closed_turb
        object-properties:
          type: area
          area: x_closed_turb
      - id: x_open_pump
        object-properties:
          type: area
          area: x_open_pump
      - id: x_open_turb
        object-properties:
          type: area
          area: x_open_turb
      - id: y_nuc_modulation
        object-properties:
          type: area
          area: y_nuc_modulation
      - id: z_batteries
        object-properties:
          type: area
          area: z_batteries
      - id: z_batteries_pcomp
        object-properties:
          type: area
          area: z_batteries_pcomp
      - id: z_effacement
        object-properties:
          type: area
          area: z_effacement
      - id: z_p2g_asservi
        object-properties:
          type: area
          area: z_p2g_asservi
      - id: z_p2g_base
        object-properties:
          type: area
          area: z_p2g_base
      - id: z_report
        object-properties:
          type: area
          area: z_report
      - id: zz_flowbased
        object-properties:
          type: area
          area: zz_flowbased

  component:
    id: electric_vehicle_eu_${area}
    parameters:
      - id: stock_energie_ve
        scenario-dependent: false
        time-dependent: true
        value:
          object-properties:
            type: thermal
            area: ve_vhr_storage
            cluster: ve_vhr_storage_ve_${area}_1
            field: thermal_series
      # - id: stock_energie_ve_2
      #   scenario-dependent: false
      #   time-dependent: true
      #   value:
      #     object-properties:
      #       type: thermal
      #       area: ve_vhr_storage
      #       cluster: ve_vhr_storage_ve_${area}_1
      #       field: thermal_series
      - id: hurdle_cost
        scenario-dependent: false
        time-dependent: false
        value:
          constant: 0.01
      - id: rendement_charge_ve
        time-dependent: false
        scenario-dependent: false
        value:
          object-properties:
            type: binding_constraint
            binding-constraint-id: ve_stock_${area}
            field: ${area}%ve_eu
      - id: rendement_v2g
        time-dependent: false
        scenario-dependent: false
        value:
          object-properties:
            type: binding_constraint
            binding-constraint-id: ve_stock_${area}
            field: ${area}.${area}_ve_inj
      - id: ve_dispo_v2g
        scenario-dependent: false
        time-dependent: true
        value:
          object-properties:
            type: thermal
            area: ${area}
            cluster: ${area}_ve_inj
            field: thermal_series
      - id: ve_dispo_charging
        scenario-dependent: false
        time-dependent: true
        value:  
          object-properties:
            type: link
            link: ${area} / ve_eu
            field: capacity_direct


  # For full modeler mode
  connections:
    - component1: electric_vehicle_eu_${area}
      port1: injection_port
      component2: ${area}
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: electric_vehicle_eu_${area}
      port: balance_port
      area: ${area}
  
  legacy-objects-to-delete: #for each area not in the exclude list, delete the legacy objects
    - id: ve_eu_load_min
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_eu_load_min
    - id: ve_level_${area}
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_level_${area}
    - id: ve_level_min_${area}
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_level_min_${area}
    - id: ve_stock_${area}
      object-properties:
        type: binding_constraint
        binding-constraint-id: ve_stock_${area}
    - id: ${area}_ve_inj
      object-properties:
        type: thermal
        area: ${area}
        cluster: ${area}_ve_inj
    - id: ve_vhr_storage_ve_${area}_1
      object-properties:
        type: thermal
        area: ve_vhr_storage
        cluster: ve_vhr_storage_ve_${area}_1
    - id: ve_vhr_storage_ve_${area}_2
      object-properties:
        type: thermal
        area: ve_vhr_storage
        cluster: ve_vhr_storage_ve_${area}_2
    - id: link_ve_eu
      object-properties:
        type: link
        link: ${area} / ve_eu
    - id: ve_eu
      object-properties:
        type: area
        area: ve_eu

    