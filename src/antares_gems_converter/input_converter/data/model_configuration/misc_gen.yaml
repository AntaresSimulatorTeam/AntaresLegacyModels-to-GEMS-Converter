# Configuration file to convert a complex modelling artefact in an Antares study into an Andromede model.

template:
  name: misc_gen
  generator-version-compatibility: X.Y #TODO: find this information
  model: antares_legacy_models.miscellaneous_generation
  template-parameters:
    - name: area

  components:
    - id: ${area}_combined_heat_power
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 0
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: combined_heat_power
        - id: miscellaneous_type
          value:
            constant: misc_ndg
    - id: ${area}_biomass
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 1
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: biomass
        - id: miscellaneous_type
          value:
            constant: misc_ndg
    - id: ${area}_biogas
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 2
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: biogas
        - id: miscellaneous_type
          value:
            constant: misc_ndg
    - id: ${area}_waste
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 3
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: waste
        - id: miscellaneous_type
          value:
            constant: misc_ndg
    - id: ${area}_geothermal
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 4
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: geothermal
        - id: miscellaneous_type
          value:
            constant: misc_ndg
    - id: ${area}_other
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 5
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: other
        - id: miscellaneous_type
          value:
            constant: misc_ndg
    - id: ${area}_pumped_storage_power
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 6
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: pumped_storage_power
        - id: miscellaneous_type
          value:
            constant: pumped_storage_power
    - id: ${area}_rest_world
      parameters:
        - id: available_power
          time-dependent: true
          scenario-dependent: false
          value:
            object-properties:
              type: misc_gen
              area: ${area}
            column: 7
      properties:
        - id: carrier
          value:
            constant: electricity
        - id: technology
          value:
            constant: rest_world
        - id: miscellaneous_type
          value:
            constant: rest_world

  # For full modeler mode
  connections:
    - component1: ${area}_combined_heat_power
      port1: balance_port
      component2: ${area}_node
      port2: balance_port
    - component1: ${area}_biomass
      port1: balance_port
      component2: ${area}_node
      port2: balance_port
    - component1: ${area}_biogas
      port1: balance_port
      component2: ${area}_node
      port2: balance_port
    - component1: ${area}_waste
      port1: balance_port
      component2: ${area}_node
      port2: balance_port
    - component1: ${area}_geothermal
      port1: balance_port
      component2: ${area}_node
      port2: balance_port
    - component1: ${area}_other
      port1: balance_port
      component2: ${area}_node
      port2: balance_port
    - component1: ${area}_pumped_storage_power
      port1: balance_port
      component2: ${area}_node
      port2: balance_port
    - component1: ${area}_rest_world
      port1: balance_port
      component2: ${area}_node
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: ${area}_combined_heat_power
      port: balance_port
      area: ${area}
    - component: ${area}_biomass
      port: balance_port
      area: ${area}
    - component: ${area}_biogas
      port: balance_port
      area: ${area}
    - component: ${area}_waste
      port: balance_port
      area: ${area}
    - component: ${area}_geothermal
      port: balance_port
      area: ${area}
    - component: ${area}_other
      port: balance_port
      area: ${area}
    - component: ${area}_pumped_storage_power
      port: balance_port
      area: ${area}
    - component: ${area}_rest_world
      port: balance_port
      area: ${area}

  legacy-objects-to-delete:
    - id: legacy_misc_gen
      object-properties:
        type: misc_gen
        area: ${area}
