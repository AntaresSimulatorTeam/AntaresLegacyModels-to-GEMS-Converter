# Configuration file to convert a complex modelling artefact in an Antares study into an Andromede model.

template:
  name: thermal
  generator-version-compatibility: X.Y #TODO: find this information
  model: antares_legacy_models.thermal
  template-parameters:
    - name: area
      cluster-type: thermal
      # exclude:

  components:
    - id: ${area}_${thermal}
      parameters:
        - id: minimum_generation_modulation
          time-dependent: true
          scenario-dependent: true
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: prepro_modulation_matrix 
            column: 3
        - id: p_max_cluster
          scenario-dependent: true
          time-dependent: true
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: thermal_series
        - id: p_min_unit
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: min_stable_power
        - id: p_max_unit
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: nominal_capacity
        - id: generation_cost
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: marginal_cost
        - id: startup_cost
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: startup_cost
        - id: fixed_cost
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: fixed_cost
        - id: d_min_up
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: min_up_time
        - id: d_min_down
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: min_down_time
        - id: unit_count
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: unit_count
        - id: spinning
          scenario-dependent: false
          time-dependent: false
          value:
            object-properties:
              type: thermal
              area: ${area}
              cluster: ${thermal}
              field: spinning

  # For full modeler mode
  connections:
    - component1: ${area}_${thermal}
      port1: balance_port
      component2: ${area}
      port2: balance_port

  # For hybrid mode
  area-connections:
    - component: ${area}_${thermal}
      port: balance_port
      area: ${area}

  legacy-objects-to-delete:
    - id: legacy_thermal_cluster
      object-properties:
        type: thermal
        area: ${area}
        cluster: ${thermal}
