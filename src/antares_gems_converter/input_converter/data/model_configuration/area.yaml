# Configuration file to convert an Antares area into an Andromede model.

template:
  name: area
  generator-version-compatibility: X.Y #TODO: find this information
  model: antares_legacy_models.area
  template-parameters:
    - name: area
      description: "Area identifier"

  components:
    - id: ${area}_node
      parameters:
        - id: unsupplied_energy_cost
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: area
              area: ${area}
              field: energy_cost_unsupplied
        - id: spillage_cost
          time-dependent: false
          scenario-dependent: false
          value:
            object-properties:
              type: area
              area: ${area}
              field: energy_cost_spilled
      properties:
        - id: carrier
          value:
            constant: electricity

  # Areas have no port-to-port connections: other components connect to them via their own templates
  connections: []
