    - id: electric_vehicle_fr  
      parameters:
        - id: stock_energie_ve #stock de batteries de VE dans le noeud ; VE_VHR_storage_VE_X_1
          time-dependent: true
          scenario-dependent: false
        # - id: stock_energie_ve_2 #stock de batteries de VE dans le noeud
        #   time-dependent: true
        #   scenario-dependent: false
        - id: hurdle_cost
          time-dependent: false
          scenario-dependent: false
        - id: rendement_charge_ve #coef Contrainte couplante de suivi de stock
          time-dependent: false
          scenario-dependent: false
        - id: rendement_v2g #coef Contrainte couplante de suivi de stock
          time-dependent: false
          scenario-dependent: false
        - id: stock_mobile #RHS Contrainte couplante de suivi de stock
          time-dependent: true
          scenario-dependent: false
        - id: ve_fr_min_24h_charging #RHS Contrainte de recharge sur la journée
          time-dependent: true
          scenario-dependent: false
        - id: ve_fr_min_24h_charging_at_night #RHS Contrainte de recharge sur la nuit
          time-dependent: true
          scenario-dependent: false
        - id: stock_minimal #RHS Contraintes de niveau minimal (level min)
          time-dependent: true
          scenario-dependent: false
        - id: ve_fr_max_v2g_24h #RHS Contrainte de limite du V2G 
          time-dependent: true
          scenario-dependent: false
        - id: ve_fr_max_mobilite_lourde_24h #RHS Contrainte d'énergie des véhicules lourds
          time-dependent: true
          scenario-dependent: false
        - id: ve_dispo_v2g #dispo du cluster thermique VE_INJ de chaque area
          time-dependent: true
          scenario-dependent: false
        - id: ve_dispo_charging #ROW Balance du noeud VE_FR_load_total
          time-dependent: true
          scenario-dependent: false
        - id: ve_dispo_mobilite_lourde #capacite lien VE_FR_mobilite_lourde
          time-dependent: true
          scenario-dependent: false
      variables:
        - id: charging
          lower-bound: 0
          upper-bound: -ve_dispo_charging
        - id: v2g
          lower-bound: 0
          upper-bound: ve_dispo_v2g
        - id: charging_mobilite_lourde
          lower-bound: 0
          upper-bound: ve_dispo_mobilite_lourde
        - id: suivi_stock_energie_ve
          lower-bound: 0
          upper-bound: stock_energie_ve
        - id: suivi_stock_energie_ve_2
          lower-bound: 0
          upper-bound: stock_energie_ve
      objective-contributions:
        - id: obj
          expression: sum(charging * hurdle_cost + charging_mobilite_lourde * hurdle_cost)
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: -charging-charging_mobilite_lourde+v2g

      constraints:
      #FR UNIQUEMENT
        #Contrainte de recharge par jour
        - id: constraint_ve_fr_min_24h_charging_day_1
          expression: (sum(t+0 .. t+23, charging))[0] >= (sum(t+0 .. t+23, ve_fr_min_24h_charging))[0]
        - id: constraint_ve_fr_min_24h_charging_day_2
          expression: (sum(t+24 .. t+47, charging))[0] >= (sum(t+24 .. t+47, ve_fr_min_24h_charging))[0]
        - id: constraint_ve_fr_min_24h_charging_day_3
          expression: (sum(t+48 .. t+71, charging))[0] >= (sum(t+48 .. t+71, ve_fr_min_24h_charging))[0]
        - id: constraint_ve_fr_min_24h_charging_day_4
          expression: (sum(t+72 .. t+95, charging))[0] >= (sum(t+72 .. t+95, ve_fr_min_24h_charging))[0]
        - id: constraint_ve_fr_min_24h_charging_day_5
          expression: (sum(t+96 .. t+119, charging))[0] >= (sum(t+96 .. t+119, ve_fr_min_24h_charging))[0]
        - id: constraint_ve_fr_min_24h_charging_day_6
          expression: (sum(t+120 .. t+143, charging))[0] >= (sum(t+120 .. t+143, ve_fr_min_24h_charging))[0]
        - id: constraint_ve_fr_min_24h_charging_day_7
          expression: (sum(t+144 .. t+166, charging))[0] >= (sum(t+144 .. t+166, ve_fr_min_24h_charging))[0]

        #Contrainte de recharge sur la nuit
        - id: constraint_ve_fr_min_24h_charging_at_night_1 #20h --> 6h
          expression: (sum(t+0 .. t+5, charging))[0] + (sum(t+21 .. t+23, charging))[0] >= (sum(t+0 .. t+23, ve_fr_min_24h_charging_at_night))[0]
        - id: constraint_ve_fr_min_24h_charging_at_night_2 #20h --> 6h
          expression: (sum(t+24 .. t+29, charging))[0] + (sum(t+45 .. t+47, charging))[0] >=  (sum(t+24 .. t+47, ve_fr_min_24h_charging_at_night))[0]
        - id: constraint_ve_fr_min_24h_charging_at_night_3 #20h --> 6h
          expression: (sum(t+48 .. t+53, charging))[0] + (sum(t+69 .. t+71, charging))[0] >=  (sum(t+48 .. t+71, ve_fr_min_24h_charging_at_night))[0]
        - id: constraint_ve_fr_min_24h_charging_at_night_4 #20h --> 6h
          expression: (sum(t+72 .. t+77, charging))[0] + (sum(t+93 .. t+95, charging))[0] >= (sum(t+72 .. t+95, ve_fr_min_24h_charging_at_night))[0]
        - id: constraint_ve_fr_min_24h_charging_at_night_5 #20h --> 6h
          expression: (sum(t+96 .. t+101, charging))[0] + (sum(t+117 .. t+119, charging))[0] >= (sum(t+96 .. t+119, ve_fr_min_24h_charging_at_night))[0]
        - id: constraint_ve_fr_min_24h_charging_at_night_6 #20h --> 6h
          expression: (sum(t+120 .. t+125, charging))[0] + (sum(t+141 .. t+143, charging))[0] >= (sum(t+120 .. t+143, ve_fr_min_24h_charging_at_night))[0]
        - id: constraint_ve_fr_min_24h_charging_at_night_7 #20h --> 6h
          expression: (sum(t+144 .. t+149, charging))[0] + (sum(t+165 .. t+167, charging))[0] >= (sum(t+144 .. t+167, ve_fr_min_24h_charging_at_night))[0]
        
        #Contrainte de limite du V2G 
        - id: constraint_ve_fr_v2g_at_day_1
          expression: (sum(t .. t+23, v2g))[0] <= (sum(t .. t+23, ve_fr_max_v2g_24h))[0]
        - id: constraint_ve_fr_v2g_at_day_2
          expression: (sum(t+24 .. t+47, v2g))[0] <= (sum(t+24 .. t+47, ve_fr_max_v2g_24h))[0]
        - id: constraint_ve_fr_v2g_at_day_3
          expression: (sum(t+48 .. t+71, v2g))[0] <= (sum(t+48 .. t+71, ve_fr_max_v2g_24h))[0]
        - id: constraint_ve_fr_v2g_at_day_4
          expression: (sum(t+72 .. t+95, v2g))[0] <= (sum(t+72 .. t+95, ve_fr_max_v2g_24h))[0]
        - id: constraint_ve_fr_v2g_at_day_5
          expression: (sum(t+96 .. t+119, v2g))[0] <= (sum(t+96 .. t+119, ve_fr_max_v2g_24h))[0]
        - id: constraint_ve_fr_v2g_at_day_6
          expression: (sum(t+120 .. t+143, v2g))[0] <= (sum(t+120 .. t+143, ve_fr_max_v2g_24h))[0]
        - id: constraint_ve_fr_v2g_at_day_7
          expression: (sum(t+144 .. t+167, v2g))[0] <= (sum(t+144 .. t+167, ve_fr_max_v2g_24h))[0]

        #Contrainte d'énergie des véhicules lourds
        - id: constraint_ve_fr_mobilite_lourde_at_day_1
          expression: (sum(t .. t+23, charging_mobilite_lourde))[0] = (sum(t .. t+23, ve_fr_max_mobilite_lourde_24h))[0]
        - id: constraint_ve_fr_mobilite_lourde_at_day_2
          expression: (sum(t+24 .. t+47, charging_mobilite_lourde))[0] = (sum(t+24 .. t+47, ve_fr_max_mobilite_lourde_24h))[0]
        - id: constraint_ve_fr_mobilite_lourde_at_day_3
          expression: (sum(t+48 .. t+71, charging_mobilite_lourde))[0] = (sum(t+48 .. t+71, ve_fr_max_mobilite_lourde_24h))[0]
        - id: constraint_ve_fr_mobilite_lourde_at_day_4
          expression: (sum(t+72 .. t+95, charging_mobilite_lourde))[0] = (sum(t+72 .. t+95, ve_fr_max_mobilite_lourde_24h))[0]
        - id: constraint_ve_fr_mobilite_lourde_at_day_5
          expression: (sum(t+96 .. t+119, charging_mobilite_lourde))[0] = (sum(t+96 .. t+119, ve_fr_max_mobilite_lourde_24h))[0]
        - id: constraint_ve_fr_mobilite_lourde_at_day_6
          expression: (sum(t+120 .. t+143, charging_mobilite_lourde))[0] = (sum(t+120 .. t+143, ve_fr_max_mobilite_lourde_24h))[0]
        - id: constraint_ve_fr_mobilite_lourde_at_day_7
          expression: (sum(t+144 .. t+167, charging_mobilite_lourde))[0] = (sum(t+144 .. t+167, ve_fr_max_mobilite_lourde_24h))[0]


      #ALL COUNTRIES INDEPENDENTLY
        #Contrainte couplante de suivi de stock
        - id: constraint_stock
          expression: suivi_stock_energie_ve_2[t+1] - suivi_stock_energie_ve[t] + rendement_charge_ve * charging + rendement_v2g * v2g = stock_mobile 
          #stock mobile = RHS de la CC VE_stock_X ; ils représentent les VE qui se connectent avec une batterie pas totalement chargée et se déconnectent avec une batterie pleine
        
        #Contraintes de niveau minimal
        - id: constraint_stock_minimal
          expression: suivi_stock_energie_ve >= stock_minimal

        #Contraintes de transmission du stock
        - id: transmission du stock
          expression: suivi_stock_energie_ve = suivi_stock_energie_ve_2


    - id: electric_vehicle_eu
      parameters:
        - id: stock_energie_ve #stock de batteries de VE dans le noeud
          time-dependent: true
          scenario-dependent: false
        # - id: stock_energie_ve_2 #stock de batteries de VE dans le noeud
        #   time-dependent: true
