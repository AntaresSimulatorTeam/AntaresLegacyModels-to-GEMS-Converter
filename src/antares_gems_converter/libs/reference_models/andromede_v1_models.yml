      port-field-definitions:
        - port: balance_port
          field: flow
          definition: -charging+v2g
        - port: ve_charging_port
          field: charging_flow
          definition: charging
      constraints:
      #ALL COUNTRIES INDEPENDENTLY
        #Contrainte couplante de suivi de stock
        - id: constraint_stock
          expression: suivi_stock_energie_ve_2[t+1] - suivi_stock_energie_ve[t] + rendement_charge_ve * charging + rendement_v2g * v2g = stock_mobile 
          #stock mobile = RHS de la CC VE_stock_X ; ils représentent les VE qui se connectent avec une batterie pas totalement chargée et se déconnectent avec une batterie pleine
        
        #Contraintes de niveau minimal
        - id: constraint_stock_minimal
          expression: suivi_stock_energie_ve >= stock_minimal

        #Contraintes de transmission du stock
        - id: transmission du stock
          expression: suivi_stock_energie_ve = suivi_stock_energie_ve_2


    - id: electric_vehicle_eu_charging_constraint
      parameters:
        - id: ve_eu_agregee_min_24h_charging_at_day #RHS Contrainte de recharge des autres pays EU (VE_EU_load_min)
          time-dependent: true
          scenario-dependent: false
      ports:
        - id: ve_charging_port
          type: charging_flow
      binding-constraints:
      #ALL CONTRIES AGGREGATED
        #Contrainte de recharge des autres pays EU 
        - id: constraint_ve_eu_agregee_min_24h_charging_at_day_1
          expression: (sum(t .. t+23, sum_connections(ve_charging_port.charging_flow)))[0] >= (sum(t .. t+23, ve_eu_agregee_min_24h_charging_at_day))[0]
        - id: constraint_ve_eu_agregee_min_24h_charging_at_day_2 
          expression: (sum(t+24 .. t+47, sum_connections(ve_charging_port.charging_flow)))[0] >= (sum(t+24 .. t+47, ve_eu_agregee_min_24h_charging_at_day))[0]
        - id: constraint_ve_eu_agregee_min_24h_charging_at_day_3 
          expression: (sum(t+48 .. t+71, sum_connections(ve_charging_port.charging_flow )))[0] >= (sum(t+48 .. t+71, ve_eu_agregee_min_24h_charging_at_day))[0]
        - id: constraint_ve_eu_agregee_min_24h_charging_at_day_4 
          expression: (sum(t+72 .. t+95, sum_connections(ve_charging_port.charging_flow)))[0] >= (sum(t+72 .. t+95, ve_eu_agregee_min_24h_charging_at_day))[0]
        - id: constraint_ve_eu_agregee_min_24h_charging_at_day_5 
          expression: (sum(t+96 .. t+119, sum_connections(ve_charging_port.charging_flow)))[0] >= (sum(t+96 .. t+119, ve_eu_agregee_min_24h_charging_at_day))[0]
        - id: constraint_ve_eu_agregee_min_24h_charging_at_day_6 
          expression: (sum(t+120 .. t+143, sum_connections(ve_charging_port.charging_flow)))[0] >= (sum(t+120 .. t+143, ve_eu_agregee_min_24h_charging_at_day))[0]
        - id: constraint_ve_eu_agregee_min_24h_charging_at_day_7 
          expression: (sum(t+144 .. t+167, sum_connections(ve_charging_port.charging_flow)))[0] >= (sum(t+144 .. t+167, ve_eu_agregee_min_24h_charging_at_day))[0]

    - id: psp_closed_daily
      parameters:
        - id: efficiency_injection
          time-dependent: false
          scenario-dependent: false
        - id: efficiency_withdrawal
          time-dependent: false
          scenario-dependent: false
        - id: p_max_injection  # Read in p_max_injection
          time-dependent: true
          scenario-dependent: true
        - id: p_max_withdrawal # Read in p_max_withdrawal
          time-dependent: true
          scenario-dependent: true
        - id: hurdle_cost
          time-dependent: false
          scenario-dependent: false
      variables:
        - id: p_injection
          lower-bound: 0
          upper-bound: p_max_injection
        - id: p_withdrawal
          lower-bound: 0
          upper-bound: p_max_withdrawal
      ports:
        - id: balance_port
          type: flow
      port-field-definitions:
        - port: balance_port
          field: flow
          definition: p_withdrawal - p_injection
      constraints:
        - id: reset_stock_daily_1
          expression: (sum(t .. t+23, efficiency_injection * p_injection - p_withdrawal * efficiency_withdrawal))[0] = 0
        - id: reset_stock_daily_2
          expression: (sum(t+24 .. t+47, efficiency_injection * p_injection - p_withdrawal * efficiency_withdrawal))[0] = 0
        - id: reset_stock_daily_3
          expression: (sum(t+48 .. t+71, efficiency_injection * p_injection - p_withdrawal * efficiency_withdrawal))[0] = 0
        - id: reset_stock_daily_4
          expression: (sum(t+72 .. t+95, efficiency_injection * p_injection - p_withdrawal * efficiency_withdrawal))[0] = 0
        - id: reset_stock_daily_5
          expression: (sum(t+96 .. t+119, efficiency_injection * p_injection - p_withdrawal * efficiency_withdrawal))[0] = 0
        - id: reset_stock_daily_6
          expression: (sum(t+120 .. t+143, efficiency_injection * p_injection - p_withdrawal * efficiency_withdrawal))[0] = 0
        - id: reset_stock_daily_7
          expression: (sum(t+144 .. t+167, efficiency_injection * p_injection - p_withdrawal * efficiency_withdrawal))[0] = 0
      objective-contributions:
        - id: obj
          expression: sum(hurdle_cost * p_injection + hurdle_cost * p_withdrawal)
          
