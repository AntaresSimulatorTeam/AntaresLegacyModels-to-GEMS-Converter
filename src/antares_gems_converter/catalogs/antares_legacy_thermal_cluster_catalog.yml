catalog:
  
  id: antares_thermal_cluster_metrics

  taxonomy: antares_legacy_taxonomy

  location:
    taxonomy-category: dispatchable_production

  metrics-definition: 

  - id: MWh
    terms:
      - taxonomy-category: dispatchable_production
        output-id: generation
        location-ports: null
    terms-operator: sum
    time-operator: sum
    breakdown:
      - key: plant

  - id: MIN.GEN.MWh
    terms:
      - taxonomy-category: dispatchable_production
        output-id: min_gen_power
        location-ports: null
    terms-operator: sum
    time-operator: sum
    breakdown:
      - key: plant

  - id: Profit.Euro
    terms:
      - taxonomy-category: dispatchable_production
        output-id: profit 
        location-ports: null
    terms-operator: sum
    time-operator: sum
    breakdown:
      - key: plant

  - id: NODU
    terms:
      - taxonomy-category: dispatchable_production
        output-id: actual_num_units_on
        location-ports: null
    terms-operator: sum
    time-operator: sum
    breakdown:
      - key: plant

  - id: NP.Cost.Euro 
    terms:
      - taxonomy-category: dispatchable_production
        output-id: non_prop_cost
        location-ports: null
    terms-operator: sum
    time-operator: sum
    breakdown:
      - key: plant
