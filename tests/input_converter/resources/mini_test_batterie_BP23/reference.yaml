          scenario-dependent: false
          time-dependent: false
          value: 1130.25
        - id: max_power_per_unit
          scenario-dependent: false
          time-dependent: false
          value: 5000.0
        - id: generation_cost
          scenario-dependent: false
          time-dependent: false
          value: 6.2
        - id: market_bid_cost
          scenario-dependent: false
          time-dependent: false
          value: 6.2
        - id: startup_cost
          scenario-dependent: false
          time-dependent: false
          value: 46200.0
        - id: fixed_cost
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: min_up_duration
          scenario-dependent: false
          time-dependent: false
          value: 24.0
        - id: min_down_duration
          scenario-dependent: false
          time-dependent: false
          value: 24.0
        - id: num_units
          scenario-dependent: false
          time-dependent: false
          value: 1.0
        - id: spinning
          scenario-dependent: false
          time-dependent: false
          value: 1.0
        - id: co2_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: nh3_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: so2_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: nox_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: pm2_5_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: pm5_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: pm10_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: nmvoc_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: op1_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: op2_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: op3_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: op4_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: op5_emissions_rate
          scenario-dependent: false
          time-dependent: false
          value: 0.0
      properties:
