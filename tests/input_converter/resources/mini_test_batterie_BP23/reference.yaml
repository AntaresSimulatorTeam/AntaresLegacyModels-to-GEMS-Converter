system:
  components:
    - id: fr_node
      model: antares_legacy_models.area
      parameters:
        - id: unsupplied_energy_cost
          scenario-dependent: false
          time-dependent: false
          value: 4000.0
        - id: spillage_cost
          scenario-dependent: false
          time-dependent: false
          value: 0.0
      properties:
        - id: carrier
          value: electricity
    - id: fr_battery
      model: andromede-v1-models.battery
      parameters:
        - id: reservoir_capacity
          scenario-dependent: false
          time-dependent: false
          value: 2000.0
        - id: injection_nominal_capacity
          scenario-dependent: false
          time-dependent: false
          value: 1100.0
        - id: withdrawal_nominal_capacity
          scenario-dependent: false
          time-dependent: false
          value: 1000.0
        - id: efficiency_injection
          scenario-dependent: false
          time-dependent: false
          value: 0.923
        - id: efficiency_withdrawal
          scenario-dependent: false
          time-dependent: false
          value: 1.026
        - id: lower_rule_curve
          scenario-dependent: false
          time-dependent: false
          value: 0.0
        - id: upper_rule_curve
          scenario-dependent: false
          time-dependent: true
          value: upper_rule_curve_fr_battery
        - id: p_max_injection_modulation
          scenario-dependent: false
          time-dependent: true
          value: p_max_injection_modulation_fr_battery
        - id: p_max_withdrawal_modulation
          scenario-dependent: false
          time-dependent: true
          value: p_max_withdrawal_modulation_fr_battery
        - id: marginal_cost
          scenario-dependent: false
          time-dependent: true
          value: marginal_cost_fr_battery
      properties:
        - id: carrier
          value: electricity
    - id: fr_load
      model: antares_legacy_models.load
      parameters:
        - id: load
          scenario-dependent: true
          time-dependent: true
          value: load_fr_load
      properties:
        - id: carrier
          value: electricity
    - id: fr_thermal_fr_nuclear_epr
      model: antares_legacy_models.thermal
      parameters:
        - id: cluster_min_gen_modulation
          scenario-dependent: true
          time-dependent: true
          value: cluster_min_gen_modulation_fr_thermal_fr_nuclear_epr
        - id: cluster_max_generation
          scenario-dependent: true
          time-dependent: true
          value: cluster_max_generation_fr_thermal_fr_nuclear_epr
