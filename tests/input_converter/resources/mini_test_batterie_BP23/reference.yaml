          value: electricity
        - id: technology
          value: nuclear
  connections:
    - component1: fr_battery
      component2: fr_node
      port1: injection_port
      port2: balance_port
    - component1: fr_load
      component2: fr_node
      port1: balance_port
      port2: balance_port
    - component1: fr_thermal_fr_nuclear_epr
      component2: fr_node
      port1: balance_port
      port2: balance_port
  id: mini_test_batterie_BP23
