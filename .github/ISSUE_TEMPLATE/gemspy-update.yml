name: GemsPy Update Detected
description: Automatically created when a new GemsPy release is detected
title: "[GEMSPY UPDATE] New release: v"
labels: ["gemspy-update"]
body:
  - type: markdown
    attributes:
      value: |
        This issue was automatically created by the `check-gemspy-update` workflow.

        **Next step:** review the GemsPy changelog and open an **A2G-04** issue if the new version impacts GEMS study generation, model validation, or output interpretation.

  - type: input
    id: gemspy_version
    attributes:
      label: New GemsPy Version
      placeholder: "e.g. 0.0.3"
    validations:
      required: true

  - type: input
    id: previous_version
    attributes:
      label: Previous Tracked Version
      placeholder: "e.g. 0.0.2"
    validations:
      required: true

  - type: textarea
    id: release_notes
    attributes:
      label: Release Notes Summary
      description: Key changes in the new GemsPy release relevant to the converter (auto-populated by workflow if available)

  - type: textarea
    id: triage
    attributes:
      label: Triage
      value: |
        - [ ] GemsPy changelog reviewed
        - [ ] A2G-04 issue opened (if API changes affect GEMS study generation, model validation, or simulation output)
        - [ ] No action needed (if release has no impact on the converter)
