name: "A2G-04 — GemsPy evolution impact on converter"
description: Track updates to the converter triggered by a new GemsPy release
title: "[A2G-04] GemsPy update — converter impact"
labels: ["A2G-04", "gemspy-update"]
body:
  - type: markdown
    attributes:
      value: |
        **Process A2G-04** — Triggered by a new GemsPy release that impacts GEMS study generation, model validation, or simulation output interpretation.

        > **Deviation from standard workflow — Step 3:** GemsPy API analysis is required before implementation. Explicitly analyse how the new API changes affect GEMS study writing (`gems_study_writer.py` equivalent), model structure validation, and output parsing. Verify that the GEMS studies generated by the converter remain valid under the new GemsPy version.

  - type: input
    id: gemspy_new_version
    attributes:
      label: New GemsPy Version
      placeholder: "e.g. 0.0.3"
    validations:
      required: true

  - type: input
    id: gemspy_previous_version
    attributes:
      label: Previous Tracked Version
      placeholder: "e.g. 0.0.2"
    validations:
      required: true

  - type: textarea
    id: trigger
    attributes:
      label: Trigger
      description: What changed in the new GemsPy release? Link to the changelog or release notes.
    validations:
      required: true

  - type: textarea
    id: api_analysis
    attributes:
      label: GemsPy API Analysis
      description: |
        A2G-04 Step 3 deviation — complete before implementation:
        - Which API surfaces changed? (GEMS study generation, model validation, simulation output)
        - How does this impact the converter's study generation logic?
        - Are generated `system.yml` structures or model references affected?
        - Is backward compatibility with the previous GemsPy version feasible?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact on Converter
      description: |
        Which converter modules need updating?
        - GEMS study generation logic
        - Model library references (`antares_legacy_models.yml`)
        - antares-runner output interpretation (`src/antares_runner/`)
    validations:
      required: true

  - type: textarea
    id: validation_strategy
    attributes:
      label: Validation Strategy
      description: How will correctness be validated after the GemsPy upgrade?
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Process Checklist
      value: |
        ### Step 1 — Issue Creation
        - [x] Issue created and linked to process A2G-04

        ### Step 2 — Triage
        - [ ] Process confirmed applicable
        - [ ] Assigned to responsible contributor
        - [ ] Priority and milestone set (if applicable)

        ### Step 3 — Impact Analysis ⚠️ GemsPy API analysis required before implementation
        - [ ] GemsPy changelog reviewed in full
        - [ ] API changes affecting GEMS study generation identified
        - [ ] Impact on generated `system.yml` and model references assessed
        - [ ] Impact on antares-runner output interpretation assessed
        - [ ] Backward compatibility with previous GemsPy version assessed

        ### Step 4 — Implementation
        - [ ] Converter code updated to align with new GemsPy API
        - [ ] `requirements.txt` / `requirements.in` updated to new GemsPy version
        - [ ] Backward compatibility maintained unless explicitly intended as breaking

        ### Step 5 — Testing & Validation
        - [ ] Solver equivalence tests pass (`pytest tests/antares_historic/`)
        - [ ] Generated GEMS studies validated as structurally correct

        ### Step 6 — CI Validation
        - [ ] Type checking passes (`mypy`)
        - [ ] Formatting passes (`black`)
        - [ ] All tests pass in CI

        ### Step 7 — Review & Merge
        - [ ] PR reviewed; documentation changes included

        ### Step 8 — Versioning
        - [ ] `pyproject.toml` version bumped (Minor)

        ### Step 9 — Supporting Files
        - [ ] `COMPATIBILITY.md` updated with new GemsPy version mapping
        - [ ] `AGENTS.md` reviewed for impact and updated if needed

        ### Step 10 — Release
        - [ ] If a release is needed: follow the release process in the Developer Guidelines
