name: Antares-Craft Update Detected
description: Automatically created when a new antares-craft release is detected on PyPI
title: "[ANTARES-CRAFT UPDATE] New release: v"
labels: ["antares-craft-update"]
body:
  - type: markdown
    attributes:
      value: |
        This issue was automatically created by the `check-antares-craft-update` workflow.

        **Next step:** review the antares-craft changelog and open an **A2G-03** issue if the new version impacts the converter's study parsing or data extraction logic.

  - type: input
    id: antares_craft_version
    attributes:
      label: New Antares-Craft Version
      placeholder: "e.g. 0.4.0"
    validations:
      required: true

  - type: input
    id: previous_version
    attributes:
      label: Previous Tracked Version
      placeholder: "e.g. 0.3.0"
    validations:
      required: true

  - type: textarea
    id: release_notes
    attributes:
      label: Release Notes Summary
      description: Key changes in the new antares-craft release relevant to the converter (auto-populated by workflow if available)

  - type: textarea
    id: triage
    attributes:
      label: Triage
      value: |
        - [ ] antares-craft changelog reviewed
        - [ ] A2G-03 issue opened (if API changes affect study parsing, data extraction, or area/link reading)
        - [ ] No action needed (if release has no impact on the converter)
