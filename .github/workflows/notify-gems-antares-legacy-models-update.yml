name: Notify GEMS — Antares Legacy Models Library Update

on:
  push:
    branches: [main]
    paths:
      - 'src/antares_gems_converter/libs/antares_historic/antares_legacy_models.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    name: Check Antares Legacy models library version and notify GEMS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read Antares Legacy converter antares legacy models library version and GEMS antares legacy models library version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GEMS_REPO_PAT }}
        run: |
          CURR=$(python3 -c "import yaml; print(yaml.safe_load(open('src/antares_gems_converter/libs/antares_historic/antares_legacy_models.yml'))['library']['version'])")
          echo "version=$CURR" >> "$GITHUB_OUTPUT"

          # Read the version currently in the GEMS repo (empty string if file absent or API unavailable)
          GEMS_VERSION=$(gh api "repos/${{ github.repository_owner }}/GEMS/contents/libraries/antares_legacy_models.yml" \
            --jq '.content' 2>/dev/null \
            | base64 -d 2>/dev/null \
            | python3 -c "import yaml,sys; print(yaml.safe_load(sys.stdin).get('library', {}).get('version', ''))" \
            2>/dev/null || echo "")

          echo "Current: $CURR  |  GEMS: $GEMS_VERSION"
          if [ "$CURR" = "$GEMS_VERSION" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue in GEMS repository
        if: steps.version.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GEMS_REPO_PAT }}
          script: |
            const version       = '${{ steps.version.outputs.version }}';
            const converterOwner = context.repo.owner;
            const converterRepo  = context.repo.repo;
            const title = `[ANTARES LEGACY MODELS] New library version: v${version}`;

            const existing = await github.rest.issues.listForRepo({
              owner: converterOwner,
              repo: 'GEMS',
              state: 'open',
            });

            const duplicate = existing.data.find(i => i.title.includes(`v${version}`));
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number} — skipping.`);
              return;
            }

            const body = [
              `Antares Legacy models library updated to \`v${version}\` in [${converterRepo}](https://github.com/${converterOwner}/${converterRepo}).`,
              '',
              'The converter is the **source of truth** for this library. To sync GEMS, simply copy the following three files from the converter into the GEMS repository — no regeneration or manual edits are required:',
              '',
              '| File | From (converter) | To (GEMS) |',
              '|---|---|---|',
              '| Library YAML | `src/antares_gems_converter/libs/antares_historic/antares_legacy_models.yml` | `libraries/antares_legacy_models.yml` |',
              '| SHA256 checksum | `src/antares_gems_converter/libs/antares_historic/antares_legacy_models.yml.sha256` | `libraries/antares_legacy_models.yml.sha256` |',
              '| Library changelog | `src/antares_gems_converter/libs/antares_historic/CHANGELOG-antares_legacy_models_library.md` | `libraries/CHANGELOG-antares_legacy_models_library.md` |',
              '',
              'That is all — copy these three files and nothing else.',
            ].join('\n');

            const result = await github.rest.issues.create({
              owner: converterOwner,
              repo: 'GEMS',
              title: title,
              body: body,
            });

            console.log(`Issue created: #${result.data.number} — ${result.data.html_url}`);
