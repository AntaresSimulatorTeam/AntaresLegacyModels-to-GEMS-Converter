name: Check Antares-Craft Update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-update:
    runs-on: ubuntu-latest
    outputs:
      update: ${{ steps.compare.outputs.update }}
      latest_version: ${{ steps.latest.outputs.version }}
      issue_number: ${{ steps.create_issue.outputs.issue_number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read current antares-craft version
        id: current
        run: |
          VERSION=$(grep 'ANTARES_CRAFT_VERSION' versions/antares-craft.txt | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Fetch latest antares-craft release from PyPI
        id: latest
        run: |
          RESPONSE=$(curl -sf "https://pypi.org/pypi/antares-craft/json")

          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Could not fetch antares-craft info from PyPI"
            exit 1
          fi

          LATEST=$(echo "$RESPONSE" | jq -r '.info.version')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "ERROR: Could not parse latest antares-craft version"
            exit 1
          fi

          echo "version=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest antares-craft version: $LATEST"

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LATEST="${{ steps.latest.outputs.version }}"
          echo "Current: $CURRENT  |  Latest: $LATEST"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "update=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date."
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: $LATEST"
          fi

      - name: Create GitHub Issue
        id: create_issue
        if: steps.compare.outputs.update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const latest = '${{ steps.latest.outputs.version }}';
            const current = '${{ steps.current.outputs.version }}';
            const title = `[ANTARES-CRAFT UPDATE] New release: v${latest}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const duplicate = existing.data.find(i => i.title.includes(`v${latest}`));
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number} - skipping.`);
              core.setOutput('issue_number', String(duplicate.number));
              return;
            }

            const body = [
              '> This issue was automatically created by the `check-antares-craft-update` workflow.',
              '',
              '## New Version Detected',
              '',
              '| | |',
              '|---|---|',
              `| **Previous version** | \`${current}\` |`,
              `| **New version** | \`${latest}\` |`,
              `| **PyPI page** | https://pypi.org/project/antares-craft/${latest}/ |`,
              '',
              '## Triage',
              '',
              '- [ ] antares-craft changelog reviewed',
              '- [ ] A2G-03 issue opened (if API changes affect study parsing, data extraction, or area/link reading)',
              '- [ ] No action needed (if release has no impact on the converter)',
              '',
              '---',
              '',
              '_Test results against this version will be posted below by the workflow._',
            ].join('\n');

            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['antares-craft-update'],
            });

            core.setOutput('issue_number', String(result.data.number));
            console.log(`Issue created: #${result.data.number} - ${result.data.html_url}`);

  e2e-new-antares-craft-version:
    name: Tests against antares-craft v${{ needs.check-update.outputs.latest_version }}
    runs-on: ubuntu-22.04
    needs: check-update
    if: needs.check-update.outputs.update == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies with new antares-craft version
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt
          pip install "antares-craft==${{ needs.check-update.outputs.latest_version }}"

      - name: Read Antares version
        id: antares
        run: |
          VERSION=$(grep 'ANTARES_SIMULATOR_VERSION' versions/antares-simulator.txt | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download and extract Antares
        run: |
          VERSION="${{ steps.antares.outputs.version }}"
          ARCHIVE="antares-${VERSION}-Ubuntu-22.04.tar.gz"
          curl -L -f -o "${ARCHIVE}" \
            "https://github.com/AntaresSimulatorTeam/Antares_Simulator/releases/download/v${VERSION}/${ARCHIVE}"
          tar -xzf "${ARCHIVE}" && rm -f "${ARCHIVE}"

      - name: Run tests
        id: run_tests
        run: pytest --cov=antares_gems_converter --cov=antares_runner --cov-report=xml -v --tb=short
        continue-on-error: true

      - name: Upload test artifacts on failure
        if: steps.run_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-antares-craft-${{ needs.check-update.outputs.latest_version }}
          path: |
            **/*.log
          retention-days: 7

      - name: Post results to issue
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.run_tests.outcome }}';
            const version = '${{ needs.check-update.outputs.latest_version }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const icon = outcome === 'success' ? '✅' : '❌';
            const status = outcome === 'success' ? 'passed' : 'failed';

            const body = [
              `## Test Results — antares-craft v${version}`,
              '',
              `${icon} Tests **${status}** against antares-craft v${version}.`,
              '',
              `[View full run](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.check-update.outputs.issue_number }}'),
              body: body,
            });

      - name: Cleanup
        if: always()
        run: |
          VERSION="${{ steps.antares.outputs.version }}"
          rm -rf "antares-${VERSION}-Ubuntu-22.04"

      - name: Fail job if tests failed
        if: steps.run_tests.outcome == 'failure'
        run: exit 1
