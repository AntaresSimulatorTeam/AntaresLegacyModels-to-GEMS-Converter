name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Type checking
        run: mypy src/

      - name: Check formatting
        uses: psf/black@stable
        with:
          version: "~=23.7.0"
          options: --check --diff

  tests:
    name: Tests
    runs-on: ubuntu-22.04
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Read Antares version
        id: antares
        run: |
          VERSION=$(grep 'ANTARES_SIMULATOR_VERSION' versions/antares-simulator.txt | cut -d'=' -f2 | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Antares version: $VERSION"

      - name: Download Antares release
        run: |
          VERSION="${{ steps.antares.outputs.version }}"
          ARCHIVE="antares-${VERSION}-Ubuntu-22.04.tar.gz"
          echo "Downloading Antares v${VERSION}..."
          curl -L -f -o "${ARCHIVE}" \
            "https://github.com/AntaresSimulatorTeam/Antares_Simulator/releases/download/v${VERSION}/${ARCHIVE}"
          echo "Download successful. File size: $(ls -lh "${ARCHIVE}" | awk '{print $5}')"

      - name: Extract Antares binaries
        run: |
          VERSION="${{ steps.antares.outputs.version }}"
          tar -xzf "antares-${VERSION}-Ubuntu-22.04.tar.gz"

      - name: Run tests
        id: run_tests
        run: pytest --cov=antares_gems_converter --cov=antares_runner --cov-report=xml

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: python-code-coverage-report
          path: coverage.xml

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures
          path: |
            **/*.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          VERSION="${{ steps.antares.outputs.version }}"
          rm -f "antares-${VERSION}-Ubuntu-22.04.tar.gz"
          rm -rf "antares-${VERSION}-Ubuntu-22.04"
