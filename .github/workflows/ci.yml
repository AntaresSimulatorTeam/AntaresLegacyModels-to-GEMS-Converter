name: CI
on:
  push:
    branches:
      - "**"

jobs:
  ci:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Type checking
        run: mypy src/

      - name: Check formatting
        uses: psf/black@stable
        with:
          # Version of Black should match the versions set in `requirements-dev.txt`
          version: "~=23.7.0"
          options: --check --diff
      - name: Set Antares version
        run: |
          ANTARES_VERSION=$(python -c "import json; print(json.load(open('main/dependencies.json'))['antares_simulator_version'])")
          echo "ANTARES_VERSION=${ANTARES_VERSION}" >> $GITHUB_ENV

      - name: Download Antares release
        run: |
          echo "Downloading Antares v${ANTARES_VERSION}..."
          curl -L -f -o antares-${ANTARES_VERSION}-Ubuntu-22.04.tar.gz \
            https://github.com/AntaresSimulatorTeam/Antares_Simulator/releases/download/v${ANTARES_VERSION}/antares-${ANTARES_VERSION}-Ubuntu-22.04.tar.gz
          if [ ! -f "antares-${ANTARES_VERSION}-Ubuntu-22.04.tar.gz" ]; then
            echo "Error: Download failed"
            exit 1
          fi
          echo "Download successful. File size: $(ls -lh antares-${ANTARES_VERSION}-Ubuntu-22.04.tar.gz | awk '{print $5}')"

      - name: Extract Antares binaries
        run: |
          echo "Extracting archive..."
          tar -xzf antares-${ANTARES_VERSION}-Ubuntu-22.04.tar.gz

      - name: Test
        run: |
          pytest --cov=antares_gems_converter --cov=antares_runner --cov-report=xml

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: python-code-coverage-report
          path: coverage.xml

      - name: Cleanup
        if: always()
        run: |
          rm -f antares-${ANTARES_VERSION}-Ubuntu-22.04.tar.gz
          rm -rf antares-${ANTARES_VERSION}-Ubuntu-22.04
          echo "Cleanup completed"
